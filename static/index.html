<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade — Cognitive Log Classification Engine</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app">
        <header class="header" style="text-align: center; margin-bottom: 3.5rem; padding-top: 2rem;">
            <div class="header-content">
                <h1
                    style="font-size: 3.75rem; font-weight: 800; color: #111111; letter-spacing: -0.04em; margin: 0 0 0.5rem 0; line-height: 1.1;">
                    Cascade
                </h1>

                <p
                    style="font-size: 1.35rem; font-weight: 400; color: #555555; letter-spacing: -0.01em; max-width: 650px; margin: 0 auto; line-height: 1.4;">
                    A high-performance, tri-layer cognitive log classification engine.
                </p>
            </div>
        </header>

        <main class="main">
            <section class="upload-section">
                <div class="upload-card">
                    <input type="file" id="csvFile" accept=".csv" class="file-input">
                    <label for="csvFile" class="file-label">
                        <div class="upload-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <span class="upload-text">Choose a CSV file</span>
                        <span class="upload-hint">Must contain 'source' and 'log_message' columns</span>
                    </label>
                    <button id="uploadBtn" class="apple-btn primary">Upload and Analyze</button>
                </div>
            </section>

            <section id="loadingIndicator" class="thinking-section hidden">
                <div class="thinking-header">
                    <div class="pulsing-dot"></div>
                    <span>Processing Pipeline Active</span>
                </div>

                <div id="thinkingLog" class="thinking-log"></div>
            </section>

            <section id="errorSection" class="error-section hidden">
                <div class="error-card">
                    <svg class="error-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff3b30"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p id="errorMessage"></p>
                    <button id="retryBtn" class="apple-btn secondary">Try Again</button>
                </div>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <div class="stats-grid" id="statsContainer">
                </div>

                <div class="results-card">
                    <div class="results-header">
                        <h2>Classification Results</h2>
                        <button id="downloadBtn" class="apple-btn secondary small">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Export CSV
                        </button>
                    </div>

                    <div class="table-container">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Source</th>
                                    <th>Log Message</th>
                                    <th>Classification</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <div id="detailModal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Engine Trace Details</h3>
                    <button id="closeModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="detail-row">
                        <span class="detail-label">Final Classification</span>
                        <span id="detailLabel" class="badge"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Resolving Layer</span>
                        <span id="detailLayer" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Model Confidence</span>
                        <span id="detailConfidence" class="detail-value highlight"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
