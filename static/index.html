<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade — Cognitive Log Classification Engine</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app">
        <div class="main-content" id="mainContent">

            <header class="header">
                <div class="header-content">
                    <h1>Cascade</h1>
                    <p>A high-performance, tri-layer cognitive log classification engine.</p>
                </div>
            </header>

            <main class="main">
                <!-- File Upload Target Layer -->
                <section class="upload-section">
                    <div class="upload-card" id="dropZone">
                        <input type="file" id="csvFile" accept=".csv" class="file-input">
                        <label for="csvFile" class="file-label">
                            <div class="upload-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <span class="upload-text" id="uploadText">Drag & Drop or Click to Upload CSV</span>
                            <span class="upload-hint">Must contain 'source' and 'log_message' columns</span>
                        </label>
                        <button id="uploadBtn" class="apple-btn primary">Upload and Analyze</button>
                    </div>
                </section>

                <!-- Processing & Thinking Pipeline View -->
                <section id="loadingIndicator" class="thinking-section hidden">
                    <div class="thinking-header">
                        <div class="pulsing-dot"></div>
                        <span>Processing Pipeline Active</span>
                    </div>
                    <div id="thinkingLog" class="thinking-log"></div>
                </section>

                <!-- Error Exception Display Layer -->
                <section id="errorSection" class="error-section hidden">
                    <div class="error-card">
                        <svg class="error-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff3b30"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p id="errorMessage"></p>
                        <button id="retryBtn" class="apple-btn secondary">Try Again</button>
                    </div>
                </section>

                <!-- Metrics Dashboard & Table Container -->
                <section id="resultsSection" class="results-section hidden">
                    <div class="stats-grid" id="statsContainer"></div>

                    <div class="results-card">
                        <div class="results-header">
                            <h2>Classification Results</h2>
                            <button id="downloadBtn" class="apple-btn secondary small">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    style="margin-right: 4px;">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Export CSV
                            </button>
                        </div>

                        <!-- Filters & Data Constraints -->
                        <div class="table-controls">
                            <div class="control-group">
                                <input type="text" id="searchInput" class="apple-input"
                                    placeholder="Search log messages or sources...">
                            </div>
                            <div class="control-group">
                                <select id="labelFilter" class="apple-select">
                                    <option value="all">All Classifications</option>
                                </select>
                            </div>
                        </div>

                        <!-- Log Result View Matrix -->
                        <div class="table-container">
                            <table class="results-table" id="resultsTable">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-sort="source">Source <span class="sort-icon"></span>
                                        </th>
                                        <th class="sortable" data-sort="log_message">Log Message <span
                                                class="sort-icon"></span></th>
                                        <th class="sortable" data-sort="target_label">Classification <span
                                                class="sort-icon"></span></th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination Navigation -->
                        <div class="pagination-controls">
                            <span id="pageInfo" class="page-info">Showing 0 of 0</span>
                            <div class="pagination-buttons">
                                <button id="prevPageBtn" class="apple-btn secondary small" disabled>Previous</button>
                                <button id="nextPageBtn" class="apple-btn secondary small" disabled>Next</button>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- UI Overlays & Modal Panes -->
    <div id="modalBackdrop" class="modal-backdrop hidden"></div>

    <div id="logModal" class="apple-modal hidden">
        <div class="modal-header">
            <h3 id="detailLabel">Unclassified</h3>
            <button id="closeModal" class="modal-close-btn">&times;</button>
        </div>

        <div class="modal-content">
            <div class="modal-stat-row">
                <div>
                    <span class="modal-label">Resolving Layer</span>
                    <div id="detailLayer" class="modal-value">Pipeline Core</div>
                </div>
                <div>
                    <span class="modal-label">Confidence Score</span>
                    <div id="detailConfidence" class="modal-value">Automated</div>
                </div>
            </div>

            <div class="modal-section">
                <span class="modal-label">Raw Log Message</span>
                <div id="detailMessage" class="modal-message-box"></div>
            </div>

            <div id="engine-insights-container" class="modal-insights">
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
